<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Form Validation</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <script src="grab-title.js" defer></script>
  </head>
  <body>
    <h1 data-drag-id="title">JS Form Validation</h1>

    <form action="">
      <div class="inputs-container">
        <div class="label-input" data-drag-id="email">
          <label for="email">EMAIL</label>
          <input
            required
            type="email"
            id="email"
            name="email"
            placeholder="someone@example.com"
            autocomplete="email"
          />
        </div>
        <div class="label-input" data-drag-id="country">
          <label for="country">COUNTRY </label>
          <select id="country" name="country" required>
            <option value="">Select a country</option>
            <option value="FR">France</option>
            <option value="US">United States</option>
          </select>
        </div>
        <div class="label-input" data-drag-id="postal">
          <label for="postal">POSTAL CODE</label>
          <input
            required
            type="text"
            id="postal"
            name="postal"
            pattern="[0-9]{5}"
            placeholder="10000"
            autocomplete="postal-code"
          />
        </div>
        <div class="label-input" data-drag-id="password">
          <label for="password">PASSWORD</label>
          <input
            required
            type="password"
            id="password"
            name="user-password"
            placeholder="8 characters minimum"
            minlength="8"
            pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
            title="Minimum 8 caractères, avec au moins une lettre et un chiffre"
          />
        </div>

        <div class="label-input" data-drag-id="confirm-password">
          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input
            required
            type="password"
            id="confirm-password"
            name="user-confirm-password"
            placeholder=""
            minlength="8"
            maxlength="64"
            autocomplete="new-password"
          />
        </div>
      </div>

      <button id="submitBtn" class="submit-btn">Steal my data</button>
    </form>
    <button onclick="resetLayout()" class="reset-layout-btn">
      Reset layout
    </button>

    <footer data-drag-id="footer">
      <p>NBX 2025 ©</p>
      <a href="https://github.com/SuperThinou" target="_blank"
        ><img
          src="assets/github-mark-grey.svg"
          alt="Github logo"
          class="github-logo"
      /></a>
    </footer>
  </body>
</html>
